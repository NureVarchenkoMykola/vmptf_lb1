<!DOCTYPE html>
<html>
<head>
    <title>Articles List</title>
</head>
<body>
    <h1>All Articles</h1>
    
    <ul>
        {% for article in articles %}
            <li>
                <a href="{% url 'article_detail' article.id %}">{{ article.title }}</a>
                <p>Author: {{ article.author.username }}</p>
                <p>Published: {{ article.publication_date }}</p>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
